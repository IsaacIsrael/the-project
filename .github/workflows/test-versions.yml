name: 🧪 Test versions

on:
  workflow_call:

jobs:
  versions:
    name: 🟢 Node & engines
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🛠️ Project Setup
        uses: ./.github/actions/setup

      - name: ✅ Verify Node version
        run: |
          echo "Node: $(node -v)"
          echo "npm: $(npm -v)"
          node -e "const e=require('./package.json').engines; if(e&&e.node&&process.version.replace('v','')!==e.node){ process.exit(1); }"
